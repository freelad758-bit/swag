<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community PRO</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
--glass: rgba(255,255,255,0.12);
--border: rgba(255,255,255,0.3);
--glow: rgba(255,215,0,0.8);
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
color:white;
overflow-x:hidden;
background:linear-gradient(135deg,#ffeb3b,#ffb300);
}

/* Реальные обои */
.background{
position:fixed;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1492724441997-5dc865305da7") center/cover no-repeat;
filter:brightness(0.65) saturate(1.3);
z-index:-1;
}

/* Плавное появление */
@keyframes fadeIn{
from{opacity:0;transform:translateY(15px);}
to{opacity:1;transform:translateY(0);}
}

.app{
padding:20px;
padding-bottom:120px;
animation:fadeIn .6s ease;
}

/* Liquid Glass */
.glass{
background:var(--glass);
backdrop-filter:blur(40px);
border-radius:25px;
border:1px solid var(--border);
box-shadow:0 0 50px var(--glow);
padding:15px;
margin-bottom:20px;
transition:.3s;
}

.glass:hover{
box-shadow:0 0 70px var(--glow);
transform:translateY(-3px);
}

/* Header */
.header{
display:flex;
align-items:center;
gap:15px;
}
.header img{
width:75px;
height:75px;
border-radius:50%;
border:2px solid white;
}

/* Pages */
.page{display:none;}
.page.active{display:block;animation:fadeIn .4s ease;}

/* Member */
.member{
padding:12px;
border-radius:15px;
background:rgba(255,255,255,0.15);
margin-bottom:10px;
}

/* Ideas */
.idea{
padding:12px;
border-radius:15px;
background:rgba(255,255,255,0.15);
margin-bottom:12px;
display:flex;
flex-direction:column;
gap:8px;
transition:.2s;
}
.idea:hover{
transform:scale(1.02);
}

.idea-top{
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
opacity:.9;
}

.idea-actions button{
margin-right:5px;
padding:6px 10px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.2);
color:white;
}

/* Input */
.idea-input{
display:flex;
gap:10px;
}
.idea-input input{
flex:1;
padding:12px;
border:none;
border-radius:15px;
outline:none;
}
.idea-input button{
padding:12px;
border:none;
border-radius:15px;
background:rgba(255,255,255,0.25);
color:white;
}

/* Bottom Nav */
.bottom-nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
backdrop-filter:blur(50px);
background:rgba(255,200,0,0.4);
}
.bottom-nav button{
flex:1;
padding:20px;
border:none;
background:rgba(255,255,255,0.15);
color:white;
font-size:16px;
transition:.2s;
}
.bottom-nav button:hover{
background:rgba(255,255,255,0.3);
}

/* Search */
.search{
padding:10px;
border-radius:15px;
border:none;
width:100%;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="background"></div>

<div class="app">

<header class="glass header">
<img id="avatar">
<div>
<h2 id="name"></h2>
<p id="username"></p>
<p id="role"></p>
</div>
</header>

<section id="home" class="page active">
<h1>Дом</h1>
<div class="glass">
<h3>Устав</h3>
<p>
Политика запрещена.<br>
Конфликты запрещены.<br>
Оскорбления запрещены.<br>
Идеи приветствуются.<br>
Администрация модерирует контент.
</p>
</div>
</section>

<section id="members" class="page">
<h1>Участники (<span id="memberCount"></span>)</h1>
<div id="memberList"></div>
</section>

<section id="ideas" class="page">
<h1>Идеи (<span id="ideaCount"></span>)</h1>

<input class="search" placeholder="Поиск..." oninput="renderIdeas(this.value)">

<div id="ideasList"></div>

<div class="idea-input glass">
<input type="text" id="ideaInput" placeholder="Напишите идею...">
<button onclick="addIdea()">Отправить</button>
</div>

<div id="adminPanel"></div>

</section>

</div>

<nav class="bottom-nav">
<button onclick="showPage('home')">Дом</button>
<button onclick="showPage('members')">Участники</button>
<button onclick="showPage('ideas')">Идеи</button>
<button onclick="tg.close()">Закрыть</button>
</nav>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let currentUserId=null;
let currentRole="Пользователь";

/* Авторизация */
if(tg.initDataUnsafe.user){
const user=tg.initDataUnsafe.user;
currentUserId=user.id;

document.getElementById("name").textContent=user.first_name;
document.getElementById("username").textContent="@"+(user.username||"unknown");
document.getElementById("avatar").src=user.photo_url||"https://via.placeholder.com/70";

/* Пример ролей */
if(user.id===123456789){
currentRole="Создатель";
}
document.getElementById("role").textContent="Роль: "+currentRole;
}

/* Навигация */
function showPage(id){
document.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* Участники */
const members=[
{name:"Admin",role:"Создатель"},
{name:"Moderator",role:"Модератор"},
{name:"User",role:"Пользователь"}
];

document.getElementById("memberCount").textContent=members.length;

members.forEach(m=>{
const div=document.createElement("div");
div.className="member";
div.textContent=m.name+" — "+m.role;
document.getElementById("memberList").appendChild(div);
});

/* Идеи */
function addIdea(){
const input=document.getElementById("ideaInput");
if(!input.value) return;

let ideas=JSON.parse(localStorage.getItem("ideas")||"[]");

ideas.push({
id:Date.now(),
user:currentUserId,
text:input.value,
likes:0,
date:new Date().toLocaleString()
});

localStorage.setItem("ideas",JSON.stringify(ideas));
input.value="";
renderIdeas();
}

function renderIdeas(filter=""){
let ideas=JSON.parse(localStorage.getItem("ideas")||"[]");

if(filter){
ideas=ideas.filter(i=>i.text.toLowerCase().includes(filter.toLowerCase()));
}

document.getElementById("ideaCount").textContent=ideas.length;

const list=document.getElementById("ideasList");
list.innerHTML="";

ideas.sort((a,b)=>b.id-a.id);

ideas.forEach(i=>{
const div=document.createElement("div");
div.className="idea";

div.innerHTML=`
<div class="idea-top">
<span>${i.date}</span>
<span>${i.likes} 👍</span>
</div>
<div>${i.text}</div>
<div class="idea-actions">
<button onclick="likeIdea(${i.id})">👍</button>
${i.user===currentUserId ? `<button onclick="deleteIdea(${i.id})">Удалить</button>`:""}
</div>
`;

list.appendChild(div);
});
}

function likeIdea(id){
let ideas=JSON.parse(localStorage.getItem("ideas")||"[]");
ideas=ideas.map(i=>{if(i.id===id)i.likes++;return i;});
localStorage.setItem("ideas",JSON.stringify(ideas));
renderIdeas();
}

function deleteIdea(id){
let ideas=JSON.parse(localStorage.getItem("ideas")||"[]");
ideas=ideas.filter(i=>i.id!==id);
localStorage.setItem("ideas",JSON.stringify(ideas));
renderIdeas();
}

renderIdeas();
</script>

</body>
</html>
