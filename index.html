<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPNet VPN - Mochi Aesthetic Edition</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: rgba(26, 26, 26, 0.85);
            --accent-blue: #00aaff;
            --accent-green: #00ff88;
            --accent-orange: #ffaa00;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --mochi-pink: #ffb7c5;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Эстетический фон Моти */
       .mochi-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.shutterstock.com/search/background-mochi'); /* Замените на реальный URL моти */
            background-size: cover;
            background-position: center;
            z-index: -1;
            opacity: 0.4; /* Прозрачность для сохранения читаемости */
            filter: blur(2px);
        }

       .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Шапка */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

       .logo {
            display: flex;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
            color: var(--accent-blue);
        }

       .logo-icon {
            margin-right: 10px;
            width: 24px;
            height: 24px;
            border: 2px solid var(--accent-blue);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

       .menu-btn {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
        }

        /* Системные настройки */
       .system-settings {
            margin-bottom: 30px;
        }

       .setting-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #222;
            color: var(--text-dim);
        }

        /* Блок подписки */
       .subscription-title {
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: 600;
        }

       .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

       .btn-action {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 12px;
            color: var(--text-main);
            text-align: center;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }

        /* Сетка карточек */
       .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

       .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

       .card-label {
            color: var(--text-dim);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

       .card-value {
            font-size: 18px;
            font-weight: 500;
        }

       .status-active { color: var(--accent-green); }
       .user-name { color: var(--accent-blue); }
       .traffic-icon { color: var(--accent-orange); }

        /* Руководство */
       .guide-section {
            margin-top: 40px;
        }

       .guide-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

       .platform-select {
            background: #1a1a1a;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
        }

       .app-list {
            display: flex;
            gap: 15px;
        }

       .app-card {
            flex: 1;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 2px solid transparent;
        }

       .app-card.active {
            border-color: var(--accent-blue);
        }

       .app-icon {
            width: 40px;
            height: 40px;
            background: #333;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

       .app-info h4 {
            margin: 0;
            font-size: 14px;
        }

       .app-info p {
            margin: 0;
            font-size: 11px;
            color: var(--text-dim);
        }

       .badge-new {
            background: var(--accent-blue);
            color: white;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="mochi-bg"></div>

    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">🛡️</div>
                XPNet
            </div>
            <div class="menu-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                    <rect y="4" width="24" height="2" rx="1"/>
                    <rect y="11" width="24" height="2" rx="1"/>
                    <rect y="18" width="24" height="2" rx="1"/>
                </svg>
            </div>
        </header>

        <div class="system-settings">
            <div class="setting-item">
                <span>Поддержка</span>
            </div>
            <div class="setting-item">
                <span>🌓 Системная</span>
                <span>▼</span>
            </div>
            <div class="setting-item">
                <span>🌐 Русский</span>
                <span>▼</span>
            </div>
        </div>

        <div class="subscription-title">Подписка</div>
        
        <div class="action-buttons">
            <div class="btn-action">🔳 QR-код</div>
            <div class="btn-action">🔗 Скопировать ссылку</div>
        </div>

        <div class="info-grid">
            <div class="card">
                <div class="card-label">👤 Имя</div>
                <div class="card-value user-name">SnFDbXAN</div>
            </div>
            <div class="card">
                <div class="card-label">🟢 Статус</div>
                <div class="card-value status-active">Активна</div>
            </div>
            <div class="card">
                <div class="card-label">📅 Действует</div>
                <div class="card-value">До 21.04.2026</div>
            </div>
            <div class="card">
                <div class="card-label">
                    <span class="traffic-icon">⇅</span> Трафик
                </div>
                <div class="card-value">46.93 GB / ∞</div>
            </div>
        </div>

        <div class="guide-section">
            <div class="guide-header">
                <h3>Руководство</h3>
                <select class="platform-select">
                    <option>🤖 Android</option>
                    <option>🍎 iOS</option>
                    <option>💻 Windows</option>
                </select>
            </div>
            
            <p style="color: var(--text-dim); font-size: 12px; margin-bottom: 15px;">ВЫБЕРИТЕ ПРИЛОЖЕНИЕ</p>

            <div class="app-list">
                <div class="app-card active">
                    <div class="app-icon">H</div>
                    <div class="app-info">
                        <h4>HAPP</h4>
                        <p>Быстрый и легкий...</p>
                    </div>
                    <div style="color: var(--accent-blue); margin-left: auto;">✓</div>
                </div>

                <div class="app-card">
                    <div class="app-icon">V2</div>
                    <div class="app-info">
                        <span class="badge-new">New</span>
                        <h4>v2RayTun</h4>
                        <p>Продвинутый клиент...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
