<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SWAGA GOLD OS</title>
    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* Настоящие золотые обои */
        .wallpaper {
            position: fixed;
            inset: 0;
            z-index: -10;
            background-image: url('https://images.unsplash.com/photo-1502239608882-93b729c6af43?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            filter: brightness(0.25) contrast(1.1) saturate(1.2);
        }

        /* Эффект супер-стекла */
        .glass {
            background: var(--glass);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 204, 0, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 10px rgba(255, 204, 0, 0.05);
        }

        .active-tab-glow {
            color: var(--gold) !important;
            filter: drop-shadow(0 0 8px rgba(255, 204, 0, 0.6));
        }

        .page {
            display: none;
            height: calc(100vh - 160px);
            overflow-y: auto;
            padding: 20px;
            animation: slideUp 0.3s ease-out;
        }

        .page.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Стили для чата */
        .idea-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid var(--gold);
        }

        input::placeholder { color: rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body>
    <div class="wallpaper"></div>

    <!-- Шапка -->
    <header class="flex items-center p-6 gap-4">
        <div class="w-14 h-14 rounded-full border-2 border-amber-500/50 p-1">
            <img id="user-pic" src="" class="w-full h-full rounded-full object-cover hidden">
            <div id="user-initial" class="w-full h-full rounded-full bg-zinc-900 flex items-center justify-center text-xl font-bold text-amber-500">?</div>
        </div>
        <div>
            <h1 id="user-name-top" class="text-xl font-black italic tracking-tighter text-amber-400">SWAGA GOLD</h1>
            <p class="text-[9px] uppercase tracking-[0.3em] text-amber-500/60">Amber OS Stable v5.0</p>
        </div>
    </header>

    <!-- БАЗА (ПРАВИЛА) -->
    <div id="home" class="page active">
        <div class="glass p-6 rounded-[30px]">
            <h2 class="text-amber-500 font-black text-xs uppercase tracking-[0.3em] mb-4">Золотой Устав</h2>
            <div class="space-y-4 text-sm text-zinc-300">
                <p>🚫 <b>Политика:</b> Запрещена в любом виде. Нарушение = бан.</p>
                <p>🥃 <b>Братство:</b> Уважай выбор каждого участника.</p>
                <p>💡 <b>Идеи:</b> Предлагай движ в специальном разделе.</p>
            </div>
        </div>
    </div>

    <!-- БРИГАДА (СПИСОК) -->
    <div id="brigada" class="page">
        <div class="space-y-3" id="users-list">
            <div class="glass p-5 rounded-2xl flex justify-between items-center">
                <span class="font-bold italic">@Admin_Root</span>
                <span class="text-[9px] bg-amber-500/20 text-amber-500 px-2 py-1 rounded">BOSS</span>
            </div>
            <div class="glass p-5 rounded-2xl flex justify-between items-center">
                <span class="font-bold italic">@User_Member</span>
                <span class="text-[9px] bg-zinc-800 text-zinc-400 px-2 py-1 rounded">MEMBER</span>
            </div>
        </div>
    </div>

    <!-- ИДЕИ (ЧАТ) -->
    <div id="ideas" class="page">
        <div id="ideas-container" class="space-y-3 mb-24">
            <!-- Сообщения будут тут -->
            <div class="text-center text-zinc-600 text-[10px] mt-10">ПОДКЛЮЧЕНИЕ К ОБЛАКУ...</div>
        </div>
        
        <div class="fixed bottom-28 left-6 right-6 flex gap-2">
            <div class="glass flex-1 rounded-2xl px-4 flex items-center">
                <input type="text" id="idea-input" class="bg-transparent w-full h-12 text-sm outline-none" placeholder="Твоя идея...">
            </div>
            <button onclick="publishIdea()" class="w-12 h-12 bg-amber-500 rounded-2xl flex items-center justify-center shadow-lg shadow-amber-500/20 active:scale-90 transition-all">
                🚀
            </button>
        </div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div id="profile" class="page">
        <div class="glass p-8 rounded-[40px] text-center">
            <div class="w-24 h-24 mx-auto mb-4 border-2 border-amber-500 p-1 rounded-3xl">
                <img id="prof-pic" src="" class="w-full h-full rounded-2xl object-cover hidden">
                <div id="prof-initial" class="w-full h-full rounded-2xl bg-zinc-900 flex items-center justify-center text-4xl text-amber-500 font-bold">?</div>
            </div>
            <h2 id="prof-name" class="text-2xl font-black text-amber-400">БРОДЯГА</h2>
            <p id="prof-tag" class="text-xs text-zinc-500 mt-1 uppercase tracking-widest">Участник</p>
        </div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <nav class="fixed bottom-6 left-6 right-6 h-20 glass rounded-[30px] flex justify-around items-center z-[100]">
        <button onclick="showTab('home')" class="nav-item flex flex-col items-center gap-1 active-tab-glow">
            <span class="text-2xl">🏛️</span>
            <span class="text-[8px] font-bold uppercase">База</span>
        </button>
        <button onclick="showTab('brigada')" class="nav-item flex flex-col items-center gap-1 text-zinc-600">
            <span class="text-2xl">👥</span>
            <span class="text-[8px] font-bold uppercase">Бригада</span>
        </button>
        <button onclick="showTab('ideas')" class="nav-item flex flex-col items-center gap-1 text-zinc-600">
            <span class="text-2xl">💭</span>
            <span class="text-[8px] font-bold uppercase">Идеи</span>
        </button>
        <button onclick="showTab('profile')" class="nav-item flex flex-col items-center gap-1 text-zinc-600">
            <span class="text-2xl">🥃</span>
            <span class="text-[8px] font-bold uppercase">Твой</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        // Firebase Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'swaga-stable';

        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Авторизация
        signInAnonymously(auth);

        // Получение данных пользователя ТГ
        const user = tg.initDataUnsafe?.user;
        if(user) {
            const name = user.first_name.toUpperCase();
            document.getElementById('user-name-top').innerText = name;
            document.getElementById('prof-name').innerText = name;
            document.getElementById('prof-tag').innerText = user.username ? '@' + user.username : 'ID: ' + user.id;

            if(user.photo_url) {
                document.getElementById('user-pic').src = user.photo_url;
                document.getElementById('user-pic').classList.remove('hidden');
                document.getElementById('user-initial').classList.add('hidden');
                document.getElementById('prof-pic').src = user.photo_url;
                document.getElementById('prof-pic').classList.remove('hidden');
                document.getElementById('prof-initial').classList.add('hidden');
            } else {
                const initial = name.charAt(0);
                document.getElementById('user-initial').innerText = initial;
                document.getElementById('prof-initial').innerText = initial;
            }
        }

        // Переключение табов
        window.showTab = (id) => {
            tg.HapticFeedback.impactOccurred('light');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');

            document.querySelectorAll('.nav-item').forEach(n => {
                n.classList.remove('active-tab-glow');
                n.classList.add('text-zinc-600');
            });
            const activeNav = document.querySelector(`button[onclick="showTab('${id}')"]`);
            activeNav.classList.add('active-tab-glow');
            activeNav.classList.remove('text-zinc-600');
        };

        // Загрузка идей в реальном времени
        const container = document.getElementById('ideas-container');
        const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'feed'), orderBy('time', 'desc'));

        onSnapshot(q, (snap) => {
            container.innerHTML = '';
            if(snap.empty) {
                container.innerHTML = '<div class="text-center text-zinc-500 text-[10px] mt-10 uppercase tracking-widest italic">Будь первым, кто нальет идею</div>';
            }
            snap.forEach(doc => {
                const d = doc.data();
                const div = document.createElement('div');
                div.className = 'idea-card';
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-1 text-[10px]">
                        <span class="font-bold text-amber-500">@${d.author || 'anon'}</span>
                        <span class="opacity-30 text-[8px]">${d.time ? new Date(d.time.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '...'}</span>
                    </div>
                    <div class="text-xs text-zinc-200">${d.text}</div>
                `;
                container.appendChild(div);
            });
        });

        // Публикация идеи
        window.publishIdea = async () => {
            const input = document.getElementById('idea-input');
            const val = input.value.trim();
            if(!val) return;

            tg.HapticFeedback.notificationOccurred('success');
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'feed'), {
                    text: val,
                    author: user?.username || user?.first_name || 'Anonymous',
                    time: serverTimestamp()
                });
                input.value = '';
            } catch (e) {
                tg.showAlert('Ошибка базы данных.');
            }
        };
    </script>
</body>
</html>
